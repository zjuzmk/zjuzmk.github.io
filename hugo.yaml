baseURL: https://zjuzmk.github.io/
title: Mengke Zhang
theme: hextra

enableGitInfo: true

defaultContentLanguage: en

languages:
  en:
    languageName: English
    weight: 1
  zh:
    languageName: 中文
    weight: 2

params:
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
  theme:
    default: system
    displayToggle: true

menu:
  main:
    - identifier: about
      name: About
      pageRef: /about
      weight: 1
    - identifier: publications
      name: Publications
      pageRef: /publications
      weight: 2
    - identifier: posts
      name: Posts
      pageRef: /posts
      weight: 3
    - name: Search
      params:
        type: search
      weight: 4
    - name: Language
      params:
        type: language-switch
        icon: translate
      weight: 5

markup:
  goldmark:
    renderer:
      unsafe: true
