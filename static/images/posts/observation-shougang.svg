<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c8c0"/>
      <stop offset="100%" stop-color="#d8d8d0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky2)"/>
  <!-- Blast furnace silhouettes -->
  <rect x="180" y="120" width="120" height="280" fill="#2a3a40" opacity="0.8"/>
  <rect x="330" y="80" width="160" height="320" fill="#2a3a40" opacity="0.9"/>
  <rect x="520" y="140" width="100" height="260" fill="#2a3a40" opacity="0.7"/>
  <!-- Furnace tops -->
  <rect x="190" y="110" width="100" height="12" rx="2" fill="#3a4a50" opacity="0.8"/>
  <rect x="340" y="68" width="140" height="14" rx="2" fill="#3a4a50" opacity="0.9"/>
  <rect x="530" y="130" width="80" height="10" rx="2" fill="#3a4a50" opacity="0.7"/>
  <!-- Industrial pipes -->
  <line x1="240" y1="200" x2="330" y2="200" stroke="#4a5a60" stroke-width="6" opacity="0.5"/>
  <line x1="410" y1="180" x2="520" y2="180" stroke="#4a5a60" stroke-width="6" opacity="0.5"/>
  <line x1="240" y1="250" x2="330" y2="250" stroke="#4a5a60" stroke-width="5" opacity="0.4"/>
  <!-- LED accent (Olympic branding) -->
  <line x1="340" y1="90" x2="480" y2="90" stroke="#2a8a85" stroke-width="2" opacity="0.6"/>
  <circle cx="340" cy="90" r="3" fill="#2a8a85" opacity="0.7"/>
  <circle cx="480" cy="90" r="3" fill="#2a8a85" opacity="0.7"/>
  <!-- Clean ground line -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#4a6a70" stroke-width="1" opacity="0.3"/>
  <!-- Small figure for scale -->
  <circle cx="600" cy="382" r="6" fill="#1a2a30" opacity="0.4"/>
  <rect x="597" y="388" width="6" height="12" fill="#1a2a30" opacity="0.4"/>
  <!-- Title -->
  <rect x="0" y="360" width="800" height="90" fill="#1a2a30" opacity="0.15"/>
  <text x="40" y="400" font-family="Georgia, serif" font-size="26" fill="#1a3a40" font-weight="600">Shougang Park</text>
  <text x="40" y="425" font-family="sans-serif" font-size="13" fill="#2a4a50" opacity="0.7">Beijing · Industrial Heritage</text>
</svg>
