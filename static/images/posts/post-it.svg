<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e4df;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4cfc7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5bfb6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Wall background -->
  <rect width="800" height="450" fill="url(#wall)"/>

  <!-- Wall texture lines -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#c8c2b8" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#c8c2b8" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#c8c2b8" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#c8c2b8" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#c8c2b8" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtle brick texture -->
  <rect x="100" y="80" width="180" height="80" fill="none" stroke="#c8c2b8" stroke-width="0.8" opacity="0.25"/>
  <rect x="280" y="80" width="200" height="80" fill="none" stroke="#c8c2b8" stroke-width="0.8" opacity="0.25"/>
  <rect x="480" y="80" width="170" height="80" fill="none" stroke="#c8c2b8" stroke-width="0.8" opacity="0.25"/>
  <rect x="650" y="80" width="150" height="80" fill="none" stroke="#c8c2b8" stroke-width="0.8" opacity="0.25"/>

  <rect x="50" y="160" width="220" height="80" fill="none" stroke="#c8c2b8" stroke-width="0.8" opacity="0.25"/>
  <rect x="270" y="160" width="180" height="80" fill="none" stroke="#c8c2b8" stroke-width="0.8" opacity="0.25"/>
  <rect x="450" y="160" width="200" height="80" fill="none" stroke="#c8c2b8" stroke-width="0.8" opacity="0.25"/>
  <rect x="650" y="160" width="150" height="80" fill="none" stroke="#c8c2b8" stroke-width="0.8" opacity="0.25"/>

  <!-- Colorful graffiti marks -->
  <circle cx="120" cy="130" r="35" fill="#ff6b6b" opacity="0.25" filter="url(#softShadow)"/>
  <circle cx="680" cy="280" r="45" fill="#4ecdc4" opacity="0.2" filter="url(#softShadow)"/>
  <circle cx="450" cy="380" r="30" fill="#ffe66d" opacity="0.3" filter="url(#softShadow)"/>
  <circle cx="250" cy="360" r="25" fill="#a8e6cf" opacity="0.25" filter="url(#softShadow)"/>

  <!-- Spray paint splatters -->
  <ellipse cx="150" cy="200" rx="60" ry="20" fill="#ff6b6b" opacity="0.15" transform="rotate(-15,150,200)"/>
  <ellipse cx="600" cy="350" rx="80" ry="25" fill="#4ecdc4" opacity="0.12" transform="rotate(10,600,350)"/>

  <!-- Scribbles -->
  <path d="M 700 100 Q 720 120, 710 140 Q 690 160, 730 150" fill="none" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <path d="M 80 360 Q 100 340, 120 370 Q 140 400, 100 410" fill="none" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <path d="M 350 100 Q 370 80, 390 110" fill="none" stroke="#ffe66d" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Main sticky note - tilted -->
  <g transform="rotate(-3, 400, 225)">
    <!-- Shadow -->
    <rect x="255" y="105" width="290" height="240" fill="#000" opacity="0.1" rx="3" transform="translate(4,4)"/>
    <!-- Note -->
    <rect x="250" y="100" width="290" height="240" fill="#fff9c4" rx="3" filter="url(#shadow)"/>
    <!-- Tape -->
    <rect x="360" y="85" width="70" height="22" fill="rgba(255,255,255,0.55)" rx="2" transform="rotate(-1, 395, 96)" filter="url(#softShadow)"/>
    <!-- Tape highlight -->
    <rect x="362" y="87" width="66" height="4" fill="rgba(255,255,255,0.8)" rx="1" transform="rotate(-1, 395, 96)"/>

    <!-- Text lines -->
    <line x1="280" y1="150" x2="510" y2="150" stroke="#e8e0a0" stroke-width="2"/>
    <line x1="280" y1="180" x2="510" y2="180" stroke="#e8e0a0" stroke-width="2"/>
    <line x1="280" y1="210" x2="510" y2="210" stroke="#e8e0a0" stroke-width="2"/>
    <line x1="280" y1="240" x2="480" y2="240" stroke="#e8e0a0" stroke-width="2"/>
    <line x1="280" y1="270" x2="460" y2="270" stroke="#e8e0a0" stroke-width="2"/>

    <!-- Text content -->
    <text x="290" y="145" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#5d5d5d" letter-spacing="0.5">随便发发</text>
    <text x="290" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#888" letter-spacing="0.3">No blog, just posts.</text>
    <text x="290" y="205" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#888" letter-spacing="0.3">想到什么写什么。</text>
    <text x="290" y="235" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#888" letter-spacing="0.3">不承诺，不预期。</text>
    <text x="290" y="265" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#aaa" font-style="italic" letter-spacing="0.2">— 2026.06.12</text>

    <!-- Doodle: small smiley -->
    <circle cx="470" cy="300" r="14" fill="none" stroke="#ff6b6b" stroke-width="2.5" opacity="0.6"/>
    <circle cx="465" cy="295" r="2" fill="#ff6b6b" opacity="0.6"/>
    <circle cx="475" cy="295" r="2" fill="#ff6b6b" opacity="0.6"/>
    <path d="M 462 303 Q 470 310, 478 303" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Smaller sticky notes around -->
  <!-- Pink note -->
  <g transform="rotate(8, 140, 180)">
    <rect x="110" y="150" width="90" height="75" fill="#ffcdd2" rx="2" filter="url(#softShadow)"/>
    <line x1="125" y1="175" x2="185" y2="175" stroke="#e8a0a5" stroke-width="1.5"/>
    <line x1="125" y1="190" x2="170" y2="190" stroke="#e8a0a5" stroke-width="1.5"/>
    <line x1="125" y1="205" x2="160" y2="205" stroke="#e8a0a5" stroke-width="1.5"/>
    <text x="125" y="170" font-family="Arial, sans-serif" font-size="10" fill="#888">TODO</text>
  </g>

  <!-- Blue note -->
  <g transform="rotate(-6, 650, 170)">
    <rect x="620" y="140" width="85" height="70" fill="#b3e5fc" rx="2" filter="url(#softShadow)"/>
    <line x1="635" y1="165" x2="690" y2="165" stroke="#90c5e0" stroke-width="1.5"/>
    <line x1="635" y1="180" x2="680" y2="180" stroke="#90c5e0" stroke-width="1.5"/>
    <line x1="635" y1="195" x2="660" y2="195" stroke="#90c5e0" stroke-width="1.5"/>
    <text x="635" y="160" font-family="Arial, sans-serif" font-size="10" fill="#888">IDEA</text>
  </g>

  <!-- Green note -->
  <g transform="rotate(12, 180, 330)">
    <rect x="150" y="300" width="80" height="65" fill="#c8e6c9" rx="2" filter="url(#softShadow)"/>
    <line x1="165" y1="325" x2="215" y2="325" stroke="#a5d6a7" stroke-width="1.5"/>
    <line x1="165" y1="340" x2="205" y2="340" stroke="#a5d6a7" stroke-width="1.5"/>
    <line x1="165" y1="355" x2="195" y2="355" stroke="#a5d6a7" stroke-width="1.5"/>
    <text x="165" y="320" font-family="Arial, sans-serif" font-size="10" fill="#888">NOTE</text>
  </g>

  <!-- Orange note -->
  <g transform="rotate(-4, 600, 330)">
    <rect x="570" y="300" width="75" height="60" fill="#ffe0b2" rx="2" filter="url(#softShadow)"/>
    <line x1="585" y1="325" x2="630" y2="325" stroke="#e0c090" stroke-width="1.5"/>
    <line x1="585" y1="340" x2="620" y2="340" stroke="#e0c090" stroke-width="1.5"/>
    <line x1="585" y1="355" x2="610" y2="355" stroke="#e0c090" stroke-width="1.5"/>
    <text x="585" y="320" font-family="Arial, sans-serif" font-size="10" fill="#888">RANT</text>
  </g>

  <!-- Purple note -->
  <g transform="rotate(5, 400, 380)">
    <rect x="370" y="355" width="70" height="55" fill="#e1bee7" rx="2" filter="url(#softShadow)"/>
    <line x1="385" y1="375" x2="425" y2="375" stroke="#c8a0d0" stroke-width="1.5"/>
    <line x1="385" y1="390" x2="415" y2="390" stroke="#c8a0d0" stroke-width="1.5"/>
    <line x1="385" y1="405" x2="405" y2="405" stroke="#c8a0d0" stroke-width="1.5"/>
    <text x="385" y="370" font-family="Arial, sans-serif" font-size="10" fill="#888">LINK</text>
  </g>

  <!-- Pin on main note -->
  <circle cx="395" cy="105" r="5" fill="#d32f2f" opacity="0.7"/>
  <circle cx="394" cy="104" r="2" fill="#fff" opacity="0.4"/>

  <!-- Coffee stain -->
  <ellipse cx="680" cy="130" rx="45" ry="38" fill="none" stroke="#8d6e63" stroke-width="1.5" opacity="0.15"/>
  <ellipse cx="680" cy="130" rx="35" ry="30" fill="none" stroke="#8d6e63" stroke-width="1" opacity="0.1"/>
  <ellipse cx="680" cy="130" rx="25" ry="22" fill="none" stroke="#8d6e63" stroke-width="0.8" opacity="0.08"/>

  <!-- Crumpled paper ball -->
  <g transform="translate(90, 280)">
    <path d="M 0 0 L 8 5 L 5 12 L -3 10 L -5 3 Z" fill="#f0ece5" stroke="#d8d2c8" stroke-width="0.5" opacity="0.8"/>
    <path d="M 0 0 L 5 -3 L 10 2 L 8 5 Z" fill="#e8e4df" stroke="#d8d2c8" stroke-width="0.5" opacity="0.8"/>
  </g>

  <!-- Another paper ball -->
  <g transform="translate(720, 250)">
    <path d="M 0 0 L 6 4 L 4 10 L -2 8 Z" fill="#f0ece5" stroke="#d8d2c8" stroke-width="0.5" opacity="0.7"/>
  </g>
</svg>