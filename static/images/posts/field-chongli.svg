  <rect x="172" y="318" width="16" height="6" rx="2" fill="#3a5a65"/>
  <circle cx="280" cy="240" r="4" fill="#3a5a65"/>
  <line x1="280" y1="240" x2="280" y2="260" stroke="#3a5a65" stroke-width="1.5"/>
